services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: etcd
    ports:
      - "2379:2379"
    command:
      - /usr/local/bin/etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
